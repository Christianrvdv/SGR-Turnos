security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Usuario
                property: nombreUsuario

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login_check
                username_parameter: _username
                password_parameter: _password
                default_target_path: app_ingreso_ci   # ← Redirige a pantalla de ingreso de CI después del login
            logout:
                path: app_logout
                target: app_login

    role_hierarchy:
        ROLE_OPERADOR_BASICO: [ ]
        ROLE_OPERADOR: [ ROLE_OPERADOR_BASICO ]
        ROLE_SUPERVISOR: [ ROLE_OPERADOR ]
        ROLE_ADMIN: [ ROLE_SUPERVISOR ]
        ROLE_SUPER_ADMIN: [ ROLE_ADMIN ]

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/ingreso, roles: ROLE_OPERADOR_BASICO }   # ← Protege la pantalla de CI
        - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/operador, roles: ROLE_OPERADOR }       # Opcional, si tienes otras rutas de operador

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
